# Experiment 01: Small NNUE on outcome labels (quick test)
# Expected: ~5 min training, baseline signal
data_path: /data/datasets/lichess_2024_01_outcomes/data.npz
architecture: nnue_256x2_32_32
epochs: 20
batch_size: 16384
learning_rate: 1e-3
weight_decay: 1e-5
loss_type: outcome_bce
eval_scale: 400.0
warmup_epochs: 2
grad_clip: 1.0
checkpoint_dir: /data/checkpoints/exp01_outcome_small
