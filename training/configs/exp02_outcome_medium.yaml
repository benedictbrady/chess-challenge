# Experiment 02: Medium NNUE on outcome labels
# Expected: ~15 min, stronger signal
data_path: /data/datasets/lichess_2024_01_outcomes/data.npz
architecture: nnue_1024x2_32_32
epochs: 40
batch_size: 16384
learning_rate: 1e-3
weight_decay: 1e-5
loss_type: outcome_bce
eval_scale: 400.0
warmup_epochs: 3
grad_clip: 1.0
checkpoint_dir: /data/checkpoints/exp02_outcome_medium
