# Experiment 05: Large NNUE (4.2M params) on outcome labels
# Uses more model capacity — closer to the 10M param limit
data_path: /data/datasets/lichess_2024_01_outcomes/data.npz
architecture: nnue_4096x2_128_32
epochs: 40
batch_size: 8192
learning_rate: 5e-4
weight_decay: 1e-5
loss_type: outcome_bce
eval_scale: 400.0
warmup_epochs: 3
grad_clip: 1.0
checkpoint_dir: /data/checkpoints/exp05_large_outcome
