# Experiment 03: NNUE on Stockfish eval labels (sigmoid MSE)
# Expected: more precise eval, ~20 min
data_path: /data/datasets/lichess_2024_01_sf_500k/data.npz
architecture: nnue_1024x2_32_32
epochs: 50
batch_size: 8192
learning_rate: 1e-3
weight_decay: 1e-5
loss_type: sigmoid_mse
eval_scale: 400.0
warmup_epochs: 3
grad_clip: 1.0
checkpoint_dir: /data/checkpoints/exp03_sf_sigmoid
